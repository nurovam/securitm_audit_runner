# Конфигурация запуска: список проверок, плагины и параметры экспорта.
audit:
  # Управление включенными проверками и источниками проверок.
  checks:
    # Встроенные проверки (True = включить базовый набор).
    builtin: false
    # Явный список идентификаторов проверок, которые будут выполнены.
    # Если список пустой, будут выполнены все зарегистрированные проверки.
    enabled:
      - met_2_1_1_no_empty_passwords
      - met_2_1_2_ssh_root_login
      - met_2_2_1_su_wheel_restriction
      - met_2_2_2_sudo_restrictions
      - met_2_3_1_passwd_group_shadow_perms
      - met_2_3_2_running_process_file_perms
      - met_2_3_3_cron_jobs_file_perms
      - met_2_3_4_sudo_exec_file_perms
      - met_2_3_5_rc_service_perms
      - met_2_3_6_system_cron_perms
      - met_2_3_7_user_cron_perms
      - met_2_3_8_system_bins_libs_perms
      - met_2_3_9_suid_sgid_perms
      - met_2_3_10_home_files_perms
      - met_2_3_11_home_dirs_perms
      - met_2_4_1_kernel_dmesg_restrict
      - met_2_4_2_kernel_kptr_restrict
      - met_2_4_3_init_on_alloc
      - met_2_4_4_slab_nomerge
      - met_2_4_5_iommu
      - met_2_4_6_randomize_kstack_offset
      - met_2_4_7_mitigations
      - met_2_4_8_bpf_jit_harden
      - met_2_5_1_vsyscall
      - met_2_5_2_perf_event_paranoid
      - met_2_5_3_debugfs
      - met_2_5_4_kexec_disabled
      - met_2_5_5_user_namespaces
      - met_2_5_6_unpriv_bpf
      - met_2_5_7_userfaultfd
      - met_2_5_8_tty_ldisc_autoload
      - met_2_5_9_tsx
      - met_2_5_10_mmap_min_addr
      - met_2_5_11_randomize_va_space
      - met_2_6_1_ptrace_scope
      - met_2_6_2_protected_symlinks
      - met_2_6_3_protected_hardlinks
      - met_2_6_4_protected_fifos
      - met_2_6_5_protected_regular
      - met_2_6_6_suid_dumpable
  # Список модулей плагинов, каждый модуль должен иметь функцию register(registry).
  plugins:
    - "securitm_audit_agent.plugins.met_rekom_linux"
  # Настройки экспорта отчетов.
  output:
    # Путь к JSON-отчету.
    json: "audit-report.json"
    # Путь к PDF-отчету. По умолчанию PDF выключен; задайте путь, если нужен экспорт.
    pdf: ""
    # Путь к TTF-шрифту с поддержкой кириллицы (например DejaVuSans.ttf).
    pdf_font_path: ""

# Настройки интеграции с SecurITM.
securitm:
  # Включить/выключить интеграцию с API.
  enabled: false
  # Базовый URL сервиса (для облака https://service.securitm.ru).
  base_url: "https://service.securitm.ru"
  # Имя переменной окружения, где хранится токен API.
  token_env: "SECURITM_TOKEN"
  # Проверка SSL-сертификата (true/false).
  verify_ssl: true
  # Настройки поиска/создания активов.
  assets:
    # Тип актива (slug из URL реестра активов).
    asset_type_slug: "computer-858"
    # Имя шаблона импорта активов.
    import_template: "Audit Agent Computers"
    # Поле имени актива в ответе API (обычно "name").
    name_field: "name"
    # Ключ в import_fields, который содержит имя актива.
    import_name_field: "Название"
    # Поля, отправляемые в импорт (строки могут содержать {hostname}/{fqdn}/{ip}).
    import_fields:
      Название: "{hostname}"
      Hostname: "{hostname}"
      IP: "{ip}"
  # Настройки создания задач по результатам FAIL.
  tasks:
    # Включить/выключить создание задач.
    enabled: true
    # Имя автора в описании (не UUID).
    author_name: "audit_agent"
    # UUID автора задачи (если пусто, поле author_uuid не передается).
    author_uuid: ""
    # UUID ответственного (если пусто, поле responsible_uuid не передается).
    responsible_uuid: ""
    # Приоритет задачи (1-4).
    priority: 2
    # Срок исполнения в днях от даты запуска.
    deadline_days: 7
    # Шаблон названия задачи.
    name_template: "[{status}] {check_id}"
    # Шаблон описания задачи.
    desc_template: "Author: {author}\\nHost: {hostname}\\nCheck: {check_id}\\nStatus: {status}\\nMessage: {message}\\nEvidence: {evidence}\\nRemediation: {remediation}"
    # Максимальная длина описания.
    desc_max_length: 5000
